<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed</title>
  <!-- Brand "Feed." icon set — generated from assets/feed-mark/ -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#566073">
  <meta name="description" content="Self-hosted single-user RSS reader.">
  <!-- Open Graph / social -->
  <meta property="og:title" content="Feed">
  <meta property="og:description" content="Self-hosted single-user RSS reader.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <!-- Google Fonts: Source Serif 4 (opsz 8..60, weights 400/500/600) + IBM Plex Sans (weights 400/500/600) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500;1,8..60,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    body {
      background-color: var(--feed-bg);
      font-family: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      color: var(--feed-ink);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="feed-web.js"></script>
</body>
</html>

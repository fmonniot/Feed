<script type="text/babel">
// Live state for the in-product Settings page across both clients.
// `setTweak(key, value)` and `setTweak({key: value, ...})` both work, matching
// the signature the old TweaksPanel exposed so editorial.jsx is unchanged.
function useLivePrefs() {
  const [prefs, setPrefs] = React.useState({
    density: 'compact',
    viewMode: 'card',
    fontSize: 18,
    refresh: '15m',
    retention: '90d',
    serverUrl: 'http://10.0.2.2:3000/',
  });
  const setTweak = React.useCallback((keyOrObj, value) => {
    if (typeof keyOrObj === 'string') {
      setPrefs((prev) => ({ ...prev, [keyOrObj]: value }));
    } else {
      setPrefs((prev) => ({ ...prev, ...keyOrObj }));
    }
  }, []);
  return [prefs, setTweak];
}

function DesktopFrame({ url, children }) {
  return (
    <ChromeWindow
      tabs={[{ title: 'Feed — RSS' }, { title: 'inbox' }, { title: 'New Tab' }]}
      activeIndex={0} url={url} width={1180} height={760}
    >
      {children}
    </ChromeWindow>
  );
}

// Two artboards (desktop · Android) per palette.
// iOS is out of scope per FEATURES.md; we ship web + android only.
function paletteRow(themeKey, t, setTweak, mobileFontSize) {
  return [
    <DCArtboard key={`${themeKey}-d`} id={`${themeKey}-desktop`} label="Desktop" width={1180} height={760}>
      <DesktopFrame url={`feed.app/inbox`}>
        <EditorialPrototype theme={themeKey} tweak={t} setTweak={setTweak} />
      </DesktopFrame>
    </DCArtboard>,
    <DCArtboard key={`${themeKey}-a`} id={`${themeKey}-android`} label="Android" width={412} height={892}>
      <AndroidDevice width={412} height={892}>
        <EditorialMobilePrototype theme={themeKey} tweak={t} setTweak={setTweak} fontSize={mobileFontSize} />
      </AndroidDevice>
    </DCArtboard>,
  ];
}

// Tiny palette card — shows the 5 key tokens for one theme.
function Chips({ themeKey, label, blurb }) {
  const T = ED_PALETTES[themeKey];
  const swatches = [
    { name: 'paper',  v: T.bg },
    { name: 'panel',  v: T.panel },
    { name: 'ink',    v: T.ink },
    { name: 'ink \u00b7 2', v: T.ink2 },
    { name: 'accent', v: T.accent },
  ];
  return (
    <div style={{
      background: T.panel, color: T.ink, padding: 22, boxSizing: 'border-box',
      height: '100%', display: 'flex', flexDirection: 'column', gap: 14,
      fontFamily: '"IBM Plex Sans", sans-serif', border: `1px solid ${T.border}`,
    }}>
      <div>
        <div style={{ fontSize: 10, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3 }}>Palette</div>
        <div style={{ fontFamily: '"Source Serif 4", Georgia, serif', fontSize: 26, fontWeight: 500,
          letterSpacing: '-.02em', marginTop: 2 }}>{label}</div>
      </div>
      <div style={{ fontFamily: '"Source Serif 4", serif', fontStyle: 'italic',
        fontSize: 14, lineHeight: 1.45, color: T.ink2, textWrap: 'pretty' }}>
        {blurb}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 'auto' }}>
        {swatches.map(s => (
          <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12 }}>
            <div style={{ width: 28, height: 28, background: s.v, border: `1px solid ${T.border}`, borderRadius: 2 }} />
            <span style={{ flex: 1, color: T.ink2 }}>{s.name}</span>
            <span style={{ color: T.ink3, fontFamily: 'ui-monospace, monospace', fontSize: 11 }}>{s.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Margin — RSS reader (Paper)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif; color: #2a251f; }
  ::selection { background: rgba(60,45,30,.18); }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="prototypes/editorial.jsx"></script>
<script type="text/babel" src="prototypes/editorial-mobile.jsx"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "regular",
  "viewMode": "list",
  "fontSize": 18
}/*EDITMODE-END*/;

function DesktopFrame({ url, children }) {
  return (
    <ChromeWindow
      tabs={[{ title: 'Margin — RSS' }, { title: 'inbox' }, { title: 'New Tab' }]}
      activeIndex={0} url={url} width={1180} height={760}
    >
      {children}
    </ChromeWindow>
  );
}

// Three artboards (desktop · iPhone · Android) for one palette.
// Returns an array so it can be spread directly into <DCSection>'s children —
// DCSection only walks DIRECT children for DCArtboards, so we cannot wrap them
// in a component.
function paletteRow(themeKey, t, mobileFontSize) {
  return [
    <DCArtboard key={`${themeKey}-d`} id={`${themeKey}-desktop`} label="Desktop" width={1180} height={760}>
      <DesktopFrame url={`margin.app/inbox`}>
        <EditorialPrototype theme={themeKey} density={t.density} viewMode={t.viewMode} fontSize={t.fontSize} />
      </DesktopFrame>
    </DCArtboard>,
    <DCArtboard key={`${themeKey}-i`} id={`${themeKey}-iphone`} label="iPhone" width={402} height={874}>
      <IOSDevice width={402} height={874}>
        <EditorialMobilePrototype theme={themeKey} density={t.density} viewMode={t.viewMode}
          fontSize={mobileFontSize} topInset={56} />
      </IOSDevice>
    </DCArtboard>,
    <DCArtboard key={`${themeKey}-a`} id={`${themeKey}-android`} label="Android" width={412} height={892}>
      <AndroidDevice width={412} height={892}>
        <EditorialMobilePrototype theme={themeKey} density={t.density} viewMode={t.viewMode}
          fontSize={mobileFontSize} topInset={14} />
      </AndroidDevice>
    </DCArtboard>,
  ];
}

// Tiny palette card — shows the 5 key tokens for one theme. Used in the notes section
// so the user can see all four palettes side-by-side as paint chips.
function Chips({ themeKey, label, blurb }) {
  const T = ED_PALETTES[themeKey];
  const swatches = [
    { name: 'paper',  v: T.bg },
    { name: 'panel',  v: T.panel },
    { name: 'ink',    v: T.ink },
    { name: 'ink \u00b7 2', v: T.ink2 },
    { name: 'accent', v: T.accent },
  ];
  return (
    <div style={{
      background: T.panel, color: T.ink, padding: 22, boxSizing: 'border-box',
      height: '100%', display: 'flex', flexDirection: 'column', gap: 14,
      fontFamily: '"IBM Plex Sans", sans-serif', border: `1px solid ${T.border}`,
    }}>
      <div>
        <div style={{ fontSize: 10, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3 }}>Palette</div>
        <div style={{ fontFamily: '"Source Serif 4", Georgia, serif', fontSize: 26, fontWeight: 500,
          letterSpacing: '-.02em', marginTop: 2 }}>{label}</div>
      </div>
      <div style={{ fontFamily: '"Source Serif 4", serif', fontStyle: 'italic',
        fontSize: 14, lineHeight: 1.45, color: T.ink2, textWrap: 'pretty' }}>
        {blurb}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 'auto' }}>
        {swatches.map(s => (
          <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12 }}>
            <div style={{ width: 28, height: 28, background: s.v, border: `1px solid ${T.border}`, borderRadius: 2 }} />
            <span style={{ flex: 1, color: T.ink2 }}>{s.name}</span>
            <span style={{ color: T.ink3, fontFamily: 'ui-monospace, monospace', fontSize: 11 }}>{s.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const mobileFontSize = Math.max(15, t.fontSize - 1);

  const palettes = ['paper'];

  return (
    <React.Fragment>
      <DesignCanvas>

        {palettes.map(key => {
          const P = ED_PALETTES[key];
          return (
            <DCSection key={key} id={key} title={`${P.label}`} subtitle={P.blurb}>
              {paletteRow(key, t, mobileFontSize)}
            </DCSection>
          );
        })}

        <DCSection id="swatches" title="Paper — paint chips" subtitle="The locked-in tokens.">
          {palettes.map(key => (
            <DCArtboard key={key} id={`${key}-chips`} label={ED_PALETTES[key].label} width={320} height={360}>
              <Chips themeKey={key} label={ED_PALETTES[key].label} blurb={ED_PALETTES[key].blurb} />
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="notes" title="Notes" subtitle="Locked palette, ready for handoff">
          <DCArtboard id="readme" label="Read me" width={580} height={460}>
            <div style={{
              width: '100%', height: '100%', background: '#f9fafb',
              padding: '30px 34px', boxSizing: 'border-box',
              fontFamily: '"Source Serif 4", Georgia, serif', color: '#1a1f28',
              display: 'flex', flexDirection: 'column', gap: 12, overflow: 'auto',
              border: '1px solid rgba(20,25,40,.08)',
            }}>
              <div style={{ fontSize: 11, letterSpacing: '.12em', textTransform: 'uppercase',
                color: 'rgba(20,25,40,.55)', fontFamily: '"IBM Plex Sans", sans-serif' }}>
                Final · Paper palette
              </div>
              <h2 style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-.015em', margin: 0, lineHeight: 1.2 }}>
                One palette, three devices — ready to hand off.
              </h2>
              <p style={{ fontSize: 14.5, lineHeight: 1.5, margin: 0, color: '#3a4150', textWrap: 'pretty' }}>
                Cool grey-white paper, near-black blue-grey ink, steel-grey accent.
                Lowest chroma of the slate family — the closest to printer-paper at long-reading distance.
              </p>
              <p style={{ fontSize: 13.5, lineHeight: 1.5, margin: 0, color: '#4a5160',
                fontFamily: '"IBM Plex Sans", sans-serif', textWrap: 'pretty' }}>
                The Tweaks panel still drives all three frames at once: density, list vs card, reader body size.
                Click the sidebar / bottom tabs to walk through Feed → Reader → Subscriptions → Settings.
              </p>
              <p style={{ fontSize: 13.5, lineHeight: 1.5, margin: 0, color: '#4a5160',
                fontFamily: '"IBM Plex Sans", sans-serif', textWrap: 'pretty' }}>
                Tokens are defined as <code style={{ background: '#eef0f3', padding: '1px 4px' }}>ED_PALETTES.paper</code>
                in <code style={{ background: '#eef0f3', padding: '1px 4px' }}>prototypes/editorial.jsx</code>.
                Type: Source Serif 4 (headlines) + IBM Plex Sans (UI).
              </p>
            </div>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)} />
        <TweakRadio label="View" value={t.viewMode}
          options={['list', 'card']}
          onChange={(v) => setTweak('viewMode', v)} />
        <TweakSection label="Reader" />
        <TweakSlider label="Body size" value={t.fontSize}
          min={14} max={24} step={1} unit="px"
          onChange={(v) => setTweak('fontSize', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

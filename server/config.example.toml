# RSS Aggregator Configuration Example
# Copy this file to config.toml and modify as needed

[server]
# Server bind address (default: "127.0.0.1")
# Use "0.0.0.0" to bind to all interfaces (for remote access)
host = "127.0.0.1"

# Server port (default: 3000)
port = 3000

[auth]
# Username for the single user account
username = "admin"

# Password hash - generate using the setup script or your preferred method
# DO NOT store plaintext passwords in production!
# Example hash for password "admin" - CHANGE THIS IN PRODUCTION
password_hash = "$argon2id$v=19$m=65536,t=2,p=1$elZxeHB1VzhpcUliR3RkMA$pSockUc1J5m0mTLfKRb/mg"

# Secret key for JWT token signing
# Use a long, random string in production (at least 32 characters)
jwt_secret = "change-this-to-a-random-secret-in-production-use-at-least-32-chars"

# Optional: You can override the jwt_secret via environment variable
# Set FEED_JWT_SECRET environment variable to override this value

# Optional: serve the compiled Wasm web client bundle.
# When set, the server also serves the SPA from assets_path with index.html fallback.
# [web]
# assets_path = "./web"

# Server fetch cadence and good-citizen behavior.
#
# These are the *config-file tier* of the settings fallback chain:
#   persisted value (settings table) -> config file value -> built-in default.
# A value persisted via a settings endpoint always overrides the matching field
# here; an omitted field (or an omitted whole [fetch] section) falls back to the
# built-in default shown in the comment.
# [fetch]
# How often the scheduler loop wakes (minutes). Per-feed interval still gates each
# fetch; this only bounds how finely short intervals can be honored.  For example,
# a 15-min per-feed interval is checked every 5 min and fetched once 15 min have
# elapsed. (default: 5)
# scheduler_tick_minutes = 5
# Default fetch interval (minutes) inherited by newly added feeds (via the API and
# OPML import). Backs the `default_fetch_interval_minutes` setting key. The value
# is clamped to min_interval_minutes before being applied. (default: 60)
# default_interval_minutes = 60
# Hard floor (minutes) on any feed's fetch interval; protects upstreams from an
# overly aggressive client request or config typo. Enforced when intervals are set,
# when new feeds inherit the default, and at each scheduler tick. (default: 15)
# min_interval_minutes = 15
# Contact URL embedded in the outgoing User-Agent so site operators can reach you.
# The server assembles the UA at runtime as `Feed/<version> (+<contact_url>)`, e.g.
# `Feed/1.4.0 (+https://github.com/fmonniot/Feed)`. The <version> is baked in at
# build time (FEED_VERSION, fallback "0.0.0-dev"), not configured here.
# (default: "https://github.com/fmonniot/Feed")
# contact_url = "https://github.com/fmonniot/Feed"
# Whether to honor upstream `Retry-After` headers on 429/503 responses. When true
# (default) a 429/503 with a `Retry-After` (delta-seconds or HTTP-date) defers the
# feed until at least that time without counting as an error; when false those
# responses fall back to the generic exponential-backoff error path. (default: true)
# respect_retry_after = true
# Enable adaptive fetch intervals. When true, feeds that return many consecutive
# 304 Not Modified responses have their effective interval lengthened (bounded by
# max_interval_minutes); feeds that change on every fetch use their configured
# interval. The user's per-feed `fetch_interval_minutes` is never mutated — the
# adaptation produces a separate effective interval. (default: false)
# adaptive_interval = false
# Hard ceiling (minutes) on the adaptive effective interval. Only meaningful when
# adaptive_interval = true. Prevents a rarely-changing feed from being checked
# less often than once per max_interval_minutes. (default: 1440, i.e. 24 hours)
# max_interval_minutes = 1440

# Article retention.
#
# Same fallback chain as [fetch]: the persisted `retention_days` /
# `retention_purge_read_only` settings (set via the retention endpoint) override
# these; omitted fields use the built-in defaults.
# [retention]
# How long articles are kept (days) before the daily 3 AM sweep purges them.
# Backs the `retention_days` setting key (a persisted value of "forever" disables
# the sweep entirely). (default: 90)
# days = 90
# When true, the sweep only deletes *read* articles, keeping unread as a durable
# TODO list. Set false for a hard age cap regardless of read state. (default: true)
# purge_read_only = true
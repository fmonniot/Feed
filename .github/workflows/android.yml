name: Android

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'shared/**'
      - 'server/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/android.yml'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Cache the built debug server binary keyed on its Rust sources. Most
      # Android PRs don't touch server/, so on a hit we restore the exact
      # binary and skip cargo entirely (a fresh checkout resets mtimes, which
      # otherwise forces cargo to relink even with a warm target cache).
      - name: Cache server binary
        id: server-binary
        uses: actions/cache@v4
        with:
          path: server/target/debug/server
          key: ${{ runner.os }}-serverbin-${{ hashFiles('server/src/**', 'server/Cargo.toml', 'server/Cargo.lock') }}

      - name: Cache Robolectric runtime jars
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: ${{ runner.os }}-robolectric
          restore-keys: ${{ runner.os }}-robolectric

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libsqlite3-dev pkg-config

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Run unit tests
        # Forks default to availableProcessors (PR #73: more, shorter-lived forks
        # minimise the per-test resource accumulation tracked in ticket #96).
        # Add -PtestDiag=true to revive the TestDiag flaky-timeout instrumentation.
        run: ./gradlew testDebugUnitTest ${{ steps.server-binary.outputs.cache-hit == 'true' && '-PskipServerBuild' || '' }}

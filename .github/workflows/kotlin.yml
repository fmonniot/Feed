name: Kotlin

on:
  pull_request:
    branches: [main]
    paths:
      - 'shared/**'
      - 'web/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/kotlin.yml'

jobs:
  test:
    name: Shared and web tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared and web tests
        run: ./gradlew :shared:allTests :web:jsTest
